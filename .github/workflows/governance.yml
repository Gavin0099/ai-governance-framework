name: Governance Check

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: PLAN.md 新鮮度檢查
  # CRITICAL → pipeline 失敗 (exit 1)
  # STALE    → warning annotation，但不擋
  # FRESH    → 通過
  # ─────────────────────────────────────────────
  plan-freshness:
    name: PLAN.md Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check PLAN.md freshness
        run: |
          # 用 $() 捕捉輸出，避免 pipe + heredoc stdin 衝突
          OUTPUT=$(python governance_tools/plan_freshness.py --format json) || true
          echo "$OUTPUT" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          status = r['status']
          days   = r.get('days_since_update')
          limit  = r.get('threshold_days', '?')
          print(f'PLAN.md status: {status} ({days}d since last update, threshold: {limit}d)')
          if status == 'CRITICAL' or status == 'ERROR':
              print('::error file=PLAN.md::PLAN.md is CRITICAL stale — please update before pushing.')
              sys.exit(1)
          elif status == 'STALE':
              print(f'::warning file=PLAN.md::PLAN.md is STALE ({days}d). Consider updating soon.')
          "

  # ─────────────────────────────────────────────
  # Job 2: Phase Gate 可驗證條件
  # tests pass + PLAN.md fresh + tools executable + docs complete
  # ─────────────────────────────────────────────
  phase-gates:
    name: Phase Gate Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Verify phase gates
        run: bash scripts/verify_phase_gates.sh

  # ─────────────────────────────────────────────
  # Job 3: 記憶壓力監控
  # EMERGENCY → pipeline 失敗
  # CRITICAL  → warning，不擋
  # WARNING   → notice，不擋
  # (continue-on-error: true — 記憶壓力是 advisory)
  # ─────────────────────────────────────────────
  memory-pressure:
    name: Memory Pressure
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check memory pressure
        run: |
          # memory/ 目錄不存在時直接跳過（新 repo 正常現象）
          if [ ! -d "memory" ]; then
            echo "memory/ not found — skipping pressure check"
            exit 0
          fi
          OUTPUT=$(python governance_tools/memory_janitor.py \
            --memory-root ./memory --check --format json) || true
          echo "$OUTPUT" | python3 -c "
          import json, sys
          r = json.load(sys.stdin)
          status = r['status']
          lines  = r['line_count']
          hard   = r.get('hard_limit', 200)
          print(f'Memory status: {status} ({lines}/{hard} lines)')
          if status == 'EMERGENCY':
              print('::error::Memory EMERGENCY — run: python governance_tools/memory_janitor.py --execute')
              sys.exit(1)
          elif status == 'CRITICAL':
              print(f'::warning::Memory CRITICAL ({lines} lines). Run memory_janitor --execute soon.')
          elif status == 'WARNING':
              print(f'::notice::Memory WARNING ({lines} lines). Monitor and plan cleanup.')
          "

  runtime-smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Normalize native payloads and dispatch shared events
        run: |
          python runtime_hooks/adapters/claude_code/normalize_event.py \
            --event-type pre_task \
            --file runtime_hooks/examples/claude_code/pre_task.native.json \
            > claude_pre.shared.json
          python runtime_hooks/dispatcher.py --file claude_pre.shared.json

          python runtime_hooks/adapters/claude_code/normalize_event.py \
            --event-type post_task \
            --file runtime_hooks/examples/claude_code/post_task.native.json \
            > claude_post.shared.json
          python runtime_hooks/dispatcher.py --file claude_post.shared.json

          python runtime_hooks/adapters/codex/normalize_event.py \
            --event-type post_task \
            --file runtime_hooks/examples/codex/post_task.native.json \
            > codex_post.shared.json
          python runtime_hooks/dispatcher.py --file codex_post.shared.json

          python runtime_hooks/adapters/gemini/normalize_event.py \
            --event-type post_task \
            --file runtime_hooks/examples/gemini/post_task.native.json \
            > gemini_post.shared.json
          python runtime_hooks/dispatcher.py --file gemini_post.shared.json
